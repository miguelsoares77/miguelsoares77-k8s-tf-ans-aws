name: Deploy K8s in AWS

on:
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to run
        required: true
        default: apply
        type: choice
        options:
          - apply
          - destroy

jobs:
  terraform:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }} 

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform/aws-env

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./terraform/aws-env

      - name: Terraform Plan
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform plan
        working-directory: ./terraform/aws-env
        
      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve
        working-directory: ./terraform/aws-env

      - name: Pull Terraform State
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform state pull > terraform.tfstate
        working-directory: ./terraform/aws-env

      - name: Install Ansible
        if: ${{ github.event.inputs.action == 'apply' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Configure SSH key
        if: ${{ github.event.inputs.action == 'apply' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa_deploy
          chmod 600 ~/.ssh/id_rsa_deploy

      - name: Generate Ansible inventory
        if: ${{ github.event.inputs.action == 'apply' }}
        run: python3 inventory.py
        working-directory: ./ansible/kubernetes

      - name: Wait for SSH
        if: ${{ github.event.inputs.action == 'apply' }}
        run: ansible all -i inventory.ini -m wait_for_connection -a "timeout=300"
        working-directory: ./ansible/kubernetes

      - name: Install Kubernetes with Ansible
        if: ${{ github.event.inputs.action == 'apply' }}
        run: ansible-playbook -i inventory.ini setup-installations.yml setup-kubernetes.yml
        working-directory: ./ansible/kubernetes

      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve
        working-directory: ./terraform/aws-env