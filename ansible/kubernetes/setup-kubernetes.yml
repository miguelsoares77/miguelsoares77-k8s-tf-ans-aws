---
- name: K8s setup
  hosts: all
  become: true  # Use sudo

  tasks:
    - name: Initialize Kubernetes cluster (controlplane only)
      ansible.builtin.command:
        cmd: kubeadm init --pod-network-cidr=10.244.0.0/16
        creates: /etc/kubernetes/admin.conf   # Prevents re-running if the cluster is already initialized
      run_once: true                          # Executes only on the first controlplane node
      when: inventory_hostname == groups['controlplane'][0]  # Ensures it runs only on the first controlplane node
      register: kubeadm_init_result
      
    - name: Create .kube directory for root user
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: inventory_hostname == groups['controlplane'][0]

    - name: Copy admin.conf to root kube config (for Ansible tasks)
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        owner: root
        group: root
        mode: '0644'
        remote_src: true
      when: inventory_hostname == groups['controlplane'][0]

    - name: Create .kube directory for the user
      ansible.builtin.file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      when: inventory_hostname == groups['controlplane'][0]

    - name: Copy admin.conf to user's kube config
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/ubuntu/.kube/config
        owner: ubuntu
        group: ubuntu
        mode: '0644'
        remote_src: true
      when: inventory_hostname == groups['controlplane'][0]

    - name: Set KUBECONFIG environment variable for ubuntu user (permanent)
      ansible.builtin.lineinfile:
        path: /home/ubuntu/.bashrc
        line: 'export KUBECONFIG=/home/ubuntu/.kube/config'
        create: true
        owner: ubuntu
        group: ubuntu
        mode: '0644'
      when: inventory_hostname == groups['controlplane'][0]

    - name: Wait for API server to be ready
      ansible.builtin.shell:
        cmd: kubectl get nodes
      register: kubectl_result
      until: kubectl_result.rc == 0
      retries: 30
      delay: 10
      when: inventory_hostname == groups['controlplane'][0]
      changed_when: false

    ##### INSTALL CNI

    - name: Install Flannel CNI
      ansible.builtin.command:
        cmd: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      when: inventory_hostname == groups['controlplane'][0]
      register: cni_result

    - name: Wait for Flannel to be ready
      ansible.builtin.command:
        cmd: kubectl -n kube-flannel get pods --field-selector=status.phase=Running
      register: flannel_pods
      until: flannel_pods.stdout_lines | length >= 1
      retries: 30
      delay: 5
      when: inventory_hostname == groups['controlplane'][0]

    - name: Wait for nodes to be Ready
      ansible.builtin.shell:
        cmd: kubectl get nodes --no-headers | grep -w Ready
      register: node_ready
      until: node_ready.rc == 0
      retries: 30
      delay: 10
      when: inventory_hostname == groups['controlplane'][0]
      changed_when: false

    # JOIN DOS WORKER NODES
    
    - name: Get kubeadm join command from controlplane
      ansible.builtin.shell:
        cmd: kubeadm token create --print-join-command
      register: join_command
      run_once: true
      when: inventory_hostname == groups['controlplane'][0]

    - name: Set join command as a fact (available to all hosts)
      ansible.builtin.set_fact:
        kubeadm_join_command: "{{ join_command.stdout }}"
      run_once: true
      when: inventory_hostname == groups['controlplane'][0]

    - name: Join worker nodes to the cluster
      ansible.builtin.command:
        cmd: "{{ hostvars[groups['controlplane'][0]]['kubeadm_join_command'] }}"
      when: 
        - inventory_hostname in groups['workers']
        - kubeadm_join_command is defined
      register: join_result

    - name: Wait for worker nodes to be registered
      ansible.builtin.shell:
        cmd: kubectl get nodes --no-headers | grep -c NotReady || true
      register: not_ready_nodes
      until: not_ready_nodes.stdout == "0"
      retries: 30
      delay: 10
      when: inventory_hostname == groups['controlplane'][0]

    - name: Show cluster status at the end
      ansible.builtin.command:
        cmd: kubectl get nodes -o wide
      register: cluster_status
      when: inventory_hostname == groups['controlplane'][0]

    - name: Display cluster nodes
      ansible.builtin.debug:
        var: cluster_status.stdout_lines
      when: inventory_hostname == groups['controlplane'][0]