---
- name: Infra setup
  hosts: all
  become: true  # Use sudo

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Change hostname
      ansible.builtin.hostname:
        name:  "{{ inventory_hostname }}"
      become: true

    - name: Install Docker
      apt:
        name: docker.io
        state: present
    
    - name: Docker group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Install passlib system package
      apt:
        name: python3-passlib
        state: present
        update_cache: yes

    - name: Disable swap
      ansible.builtin.command: swapoff -a
      when: ansible_facts["swaptotal_mb"] > 0
      become: true

    - name: Remove Swap from fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+.*)$'
        replace: '# \1'
        
    - name: Load kernel modules
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: Activate kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Configure sysctl for Kubernetes
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1

    - name: Apply sysctl settings
      command: sysctl --system
      
    - name: Install dependencies
      apt:
        name: 
          - apt-transport-https
          - ca-certificates
          - curl
          - gpg
          - containerd
        state: present
        update_cache: yes

    - name: Create containerd config directory
      file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Generate default containerd config
      shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Set SystemdCgroup to true in containerd config
      lineinfile:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        line: 'SystemdCgroup = true'
      notify: Restart containerd

    - name: Enable and start containerd
      systemd:
        name: containerd
        state: started
        enabled: yes

    - name: Flush handlers
      meta: flush_handlers

  ###### INSTALL KUBERNETES ######

    - name: Create keyrings directory for apt
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Kubernetes official repository (deb822 format)
      ansible.builtin.deb822_repository:
        name: kubernetes
        types: [deb]
        uris: https://pkgs.k8s.io/core:/stable:/v1.35/deb/
        suites: /
        components: ['']
        signed_by: https://pkgs.k8s.io/core:/stable:/v1.35/deb/Release.key
        state: present
        enabled: true

    - name: Install kubelet, kubeadm and kubectl
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: yes

    - name: Hold kubelet, kubeadm and kubectl at current version
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: Enable and start kubelet
      systemd:
        name: kubelet
        enabled: yes
        state: started

  handlers:
    - name: Restart containerd
      systemd:
        name: containerd
        state: restarted